version: '3.8'

services:
  backend:
    build: .
    container_name: fastapi_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PISTON_API_URL=http://piston:2000/api/v2/execute
    depends_on:
      - piston

  piston:
    image: ghcr.io/engineer-man/piston:latest
    container_name: piston_api
    restart: always
    privileged: true
    ports:
      - "2000:2000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - piston_data:/piston
    # Piston configuration (reflected from its documentation)
    environment:
      - PISTON_LOG_LEVEL=INFO
      - PISTON_PORT=2000

volumes:
  piston_data:
